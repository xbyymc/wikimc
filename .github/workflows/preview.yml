name: 构建预览测试

on:
  push:
    branches: [ main ]  # 你推代码就自动构建预览
  pull_request:
    branches: [ main ]  # 别人提PR也自动构建

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 构建Astro
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: 部署到GitHub Pages预览
        uses: actions/deploy-pages@v4
